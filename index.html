<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: 10px;
      overflow: hidden;
    }
    header {
      padding: 14px 16px;
      font-weight: 600;
      font-size: 13px;
      border-bottom: 1px solid #313244;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    button {
      background: none; border: none; color: #89b4fa;
      cursor: pointer; font-size: 16px;
    }
    .port-list { padding: 8px; max-height: 360px; overflow-y: auto; }
    .port-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 6px;
      transition: background .15s;
    }
    .port-item:hover { background: #313244; }
    .port  { font-family: monospace; color: #89b4fa; width: 70px; }
    .proc  { flex: 1; font-size: 12px; color: #bac2de; }
    .badge {
      font-size: 10px; padding: 2px 7px; border-radius: 10px;
      background: #a6e3a133; color: #a6e3a1;
    }
    .empty { text-align: center; padding: 40px; color: #585b70; }
  </style>
</head>
<body>
  <header>
    <span>⚡ Puertos en uso</span>
    <button onclick="load()">↻</button>
  </header>
  <div class="port-list" id="list">
    <div class="empty">Cargando...</div>
  </div>

  <script>
    async function load() {
      const ports = await window.api.getPorts()
      const list = document.getElementById('list')

      if (!ports.length) {
        list.innerHTML = '<div class="empty">Sin puertos activos</div>'
        return
      }

      list.innerHTML = ports.map(p => `
        <div class="port-item">
          <span class="port">${p.port}</span>
          <span class="proc">${p.process}</span>
          <span class="badge">LISTEN</span>
        </div>
      `).join('')
    }

    window.api.onRefresh(load)
    load()
  </script>
</body>
</html>
