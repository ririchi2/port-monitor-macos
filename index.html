<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: rgba(0, 0, 0, 0.45);
      color: rgba(255, 255, 255, 0.85);
      border-radius: 10px;
      overflow: hidden;
    }
    header {
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.1px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    button {
      background: none; border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer; font-size: 15px;
      padding: 2px 4px; border-radius: 4px;
      transition: color .15s, background .15s;
    }
    button:hover {
      color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.1);
    }
    .port-list { padding: 6px; max-height: 370px; overflow-y: auto; }
    .port-list::-webkit-scrollbar { width: 4px; }
    .port-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    .port-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 6px;
      transition: background .12s;
    }
    .port-item:hover { background: rgba(255, 255, 255, 0.08); }
    .port  { font-family: ui-monospace, monospace; font-size: 12px; color: #0A84FF; width: 66px; }
    .proc  { flex: 1; font-size: 12px; color: rgba(255, 255, 255, 0.6); }
    .pid   { font-size: 11px; color: rgba(255, 255, 255, 0.3); }
    .empty { text-align: center; padding: 40px; font-size: 13px; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <header>
    <button tabindex="-1" onclick="load()">↻</button>
    <span>⚡ Puertos en uso</span>
    <button tabindex="-1" onclick="window.api.quit()">✕</button>
  </header>
  <div class="port-list" id="list">
    <div class="empty">Cargando...</div>
  </div>

  <script>
    async function load() {
      const ports = await window.api.getPorts()
      const list = document.getElementById('list')

      if (!ports.length) {
        list.innerHTML = '<div class="empty">Sin puertos activos</div>'
        return
      }

      list.innerHTML = ports.map(p => `
        <div class="port-item">
          <span class="port">${p.port}</span>
          <span class="proc">${p.process}</span>
          <span class="pid">${p.pid}</span>
        </div>
      `).join('')
    }

    window.api.onRefresh(load)
    load()
  </script>
</body>
</html>
