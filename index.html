<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <button tabindex="-1" onclick="load()">↻</button>
    <span>⚡ Puertos en uso</span>
    <button tabindex="-1" onclick="window.api.quit()">✕</button>
  </header>
  <div class="port-list">
    <div class="list-header">
      <span class="port">Port</span>
      <span class="proc">Process</span>
      <span class="pid">PID</span>
    </div>
    <div id="list">
    <div class="empty">Cargando...</div>
    </div>
  </div>

  <script>
    async function load() {
      const ports = await window.api.getPorts()
      const list = document.getElementById('list')

      if (!ports.length) {
        list.innerHTML = '<div class="empty">Sin puertos activos</div>'
        return
      }

      list.innerHTML = ports.map(p => `
        <div class="port-item">
          <span class="port">${p.port}</span>
          <span class="proc">${p.process}</span>
          <span class="pid">${p.pid}</span>
        </div>
      `).join('')
    }

    window.api.onRefresh(load)
    load()
  </script>
</body>
</html>
